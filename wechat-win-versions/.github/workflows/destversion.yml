name: Wechat Dest Version

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      download_link:
        description: 'The manual WechatSetup.exe download link (leave empty to auto-fetch from https://pc.weixin.qq.com/)'
        required: false

permissions:
  contents: write

jobs:
  save_new_wechat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - name: Test Github Action Server Time
      #   run: echo `date`
      - name: Install 7-Zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
      - name: Check new version and push
        env: 
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOWNLOAD_LINK: ${{ github.event.inputs.download_link || '' }}
        run: bash -x ./scripts/destVersionRelease.sh
